version: '3.8'

# ========================================
# AI News Bot Docker Compose 配置
# ========================================
#
# 启动方式:
# 1. 复制 .env.example 为 .env 并配置
# 2. 运行 docker-compose up -d
#
# 服务:
# - app: 后端 API 服务
# - web: 前端 Web Panel
# - nginx: Nginx反向代理 + SSL
# - rsshub: RSSHub 服务（可选，需 --profile rsshub）
#
# 可选依赖:
# - docker-compose -f docker-compose.ollama.yml up -d   # Ollama 本地 LLM
#
# RSSHub 启动方式（二选一）:
# 方式1: docker compose --profile rsshub up -d          # 与主服务一起启动
# 方式2: docker-compose -f docker-compose.rsshub.yml up -d  # 独立启动

services:
  # 后端 API 服务
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-news-bot-app
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./storage:/app/storage
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/storage/database.db
      - RSSHUB_URL=http://rsshub:1200   # Docker 内部网络地址
    env_file:
      - ./app/.env
    networks:
      - ai-news-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端 Web Panel
  web:
    build:
      context: ./web-panel
      dockerfile: Dockerfile
    container_name: ai-news-bot-web
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./web-panel/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ai-news-network
    environment:
      - VITE_API_BASE_URL=/api

  # Nginx反向代理 (带SSL)
  nginx:
    image: nginx:latest
    container_name: ai-news-bot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./storage:/var/www/storage
    depends_on:
      - app
      - web
    networks:
      - ai-news-network

  # RSSHub 服务（可选，默认不启动）
  # 启动方式: docker compose --profile rsshub up -d
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: unless-stopped
    profiles:
      - rsshub
    expose:
      - "1200"
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - PORT=1200
      - LOG_LEVEL=info
      - REQUEST_TIMEOUT=30000
      - CACHE_MAX_ITEMS=1000
      - CACHE_TTL=600
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-news-network

# 网络配置
networks:
  ai-news-network:
    driver: bridge
