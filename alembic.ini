# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Database URL - set via environment variable or in code
# sqlalchemy.url = driver://user:pass@localhost/dbname
sqlalchemy.url = sqlite+aiosqlite:///storage/database.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
