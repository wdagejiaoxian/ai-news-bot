[loggers]
keys=root,app

[handlers]
keys=fileHandler,consoleHandler

[formatters]
keys=detailed

[logger_root]
level=INFO
handlers=fileHandler,consoleHandler

[logger_app]
level=INFO
handlers=fileHandler,consoleHandler
qualname=app
propagate=0

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailed
args=('logs/app.log', 'a', 10485760, 5)

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=detailed
args=(sys.stdout,)

[formatter_detailed]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
